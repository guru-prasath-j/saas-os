# trustStoreType=Windows-ROOT: this machine's AVG antivirus intercepts TLS
# with its own root CA (trusted by Windows, not by the JDK's cacerts), which
# breaks all new dependency downloads with PKIX errors. Using the Windows
# cert store makes the Gradle JVM trust what the OS trusts.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djavax.net.ssl.trustStoreType=Windows-ROOT
android.useAndroidX=true
# Third-party Flutter plugins ship mismatched Java/Kotlin JVM targets
# (flutter_tts=11, receive_sharing_intent=1.8); Kotlin 2.x fails the build on
# that by default. Warn instead — root build.gradle.kts pins Kotlin to 17.
kotlin.jvm.target.validation.mode=warning
